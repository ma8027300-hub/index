<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Qasr El Baron Menu</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo',sans-serif;
      background:#0d0d0d;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:25px;
      color:white;
      overflow-x:auto;
    }

    /* A4 Landscape Size */
    .menu-book{
      width:1123px;
      min-height:794px;
      max-width:100%;
      background:#1b1b1b;
      display:grid;
      grid-template-columns:1fr 1fr;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 25px 60px rgba(0,0,0,0.7);
    }

    .page{
      padding:40px;
      position:relative;
      overflow:hidden;
    }

    .left-page{
      background:#181818;
      border-left:1px solid rgba(255,255,255,0.07);
    }

    .right-page{
      background:#202020;
    }

    /* Logo */
    .logo-box{
      width:170px;
      position:absolute;
      top:25px;
      right:25px;
      z-index:5;
    }

    .logo-box img{
      width:100%;
      border-radius:22px;
      background:white;
      padding:10px;
      object-fit:contain;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .menu-title{
      color:#d8a247;
      font-size:52px;
      font-weight:700;
      margin-top:20px;
      margin-bottom:8px;
      text-align:left;
    }

    .menu-subtitle{
      color:#cfcfcf;
      font-size:17px;
      margin-bottom:45px;
      text-align:left;
    }

    .menu-section{
      margin-top:25px;
    }

    .section-title{
      color:#d8a247;
      font-size:28px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      padding-bottom:10px;
    }

    .menu-image{
      width:100%;
      height:auto;
      max-height:520px;
      object-fit:contain;
      border-radius:20px;
      background:white;
      padding:5px;
      border:2px solid rgba(255,255,255,0.06);
      transition:0.3s;
    }

    .menu-image:hover{
      transform:scale(1.01);
    }

    footer{
      margin-top:22px;
      color:#999;
      font-size:14px;
      text-align:center;
      letter-spacing:1px;
    }

    footer span{
      color:#d8a247;
      font-weight:700;
    }

    @media(max-width:900px){

      .menu-book{
        width:100%;
        min-height:auto;
        grid-template-columns:1fr;
      }

      .left-page{
        border-left:none;
        border-bottom:1px solid rgba(255,255,255,0.07);
      }

      .logo-box{
        width:130px;
        top:20px;
        right:20px;
      }

      .menu-title{
        font-size:38px;
        margin-top:120px;
      }

      .menu-image{
        max-height:400px;
      }
    }
  </style>
</head>

<body>

  <div class="menu-book">

    <!-- LEFT PAGE -->
    <div class="page left-page">

      <!-- LOGO -->
      <div class="logo-box">
        <img src="LOGO.png" alt="Qasr El Baron Logo">
      </div>

      <!-- TITLE -->
      <h1 class="menu-title">قصر البارون</h1>

      <p class="menu-subtitle">
        للحلويات الشرقية والغربية والمخبوزات
      </p>

      <!-- EASTERN SECTION -->
      <div class="menu-section">

        <h2 class="section-title">الشرقي</h2>

        <!-- IMAGE -->
        <img src="شرقي.jpg" alt="Eastern Sweets" class="menu-image">

      </div>

    </div>

    <!-- RIGHT PAGE -->
    <div class="page right-page">

      <!-- WESTERN SECTION -->
      <div class="menu-section">

        <h2 class="section-title">الغربي (التورت)</h2>

        <!-- IMAGE -->
        <img src="تورته.jpg" alt="Cake Menu" class="menu-image">

      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    &copy; Made By <span>Alpha printer</span> &amp; <span>Mohamed Eltaweel</span>
  </footer>

</body>
</html>
